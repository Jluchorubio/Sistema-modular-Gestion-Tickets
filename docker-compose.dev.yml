version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tickets_postgres_dev
    environment:
      POSTGRES_DB: tickets_db_dev
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: tickets_pass
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tickets_redis_dev
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: tickets_backend_dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://tickets_user:tickets_pass@postgres:5432/tickets_db_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
      - "9229:9229"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: tickets_frontend_dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_dev_data:
