<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Test — Tickets System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .88; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; margin-bottom: 12px; }
    .btn-google  {
      background: #fff;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-danger  { background: #ef4444; color: #fff; margin-top: 12px; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: #475569;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }
    #mfa-section { display: none; }
    #result-section { display: none; margin-top: 20px; }
    pre {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      overflow-x: auto;
      color: #a5f3fc;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tag-ok  { background: #064e3b; color: #6ee7b7; }
    .tag-err { background: #450a0a; color: #fca5a5; }
    .tag-mfa { background: #312e81; color: #c7d2fe; }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-email { font-size: 12px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<div class="card">
  <h1>🎫 Tickets System</h1>
  <p class="sub">Auth test — backend en <code>localhost:3001</code></p>

  <!-- LOGIN FORM -->
  <div id="login-section">
    <label>Email</label>
    <input type="email" id="email" value="joselu.rubio2008@gmail.com" autocomplete="username">

    <label>Contraseña</label>
    <input type="password" id="password" value="123456789" autocomplete="current-password">

    <button class="btn-primary" id="btn-login" onclick="doLogin()">Iniciar sesión</button>

    <div class="divider">o</div>

    <button class="btn-google" id="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.1-2.7-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.7-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.5l6.2 5.2C36.9 36.3 44 31 44 24c0-1.3-.1-2.7-.4-3.9z"/>
      </svg>
      Continuar con Google
    </button>
  </div>

  <!-- MFA SECTION -->
  <div id="mfa-section">
    <div class="tag tag-mfa">🔐 2FA requerido</div>
    <p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">
      Abre Google Authenticator e ingresa el código de 6 dígitos.
    </p>
    <label>Código TOTP</label>
    <input type="text" id="totp-code" placeholder="000000" maxlength="6" inputmode="numeric"
      oninput="this.value=this.value.replace(/\D/g,'')">
    <button class="btn-primary" onclick="doVerifyMfa()">Verificar código</button>
    <button style="width:100%;padding:10px;background:transparent;border:1px solid #334155;border-radius:8px;color:#94a3b8;cursor:pointer;font-size:13px;margin-top:8px;"
      onclick="resetToLogin()">← Volver al login</button>
  </div>

  <!-- RESULT SECTION -->
  <div id="result-section">
    <div id="user-badge" class="user-badge" style="display:none">
      <div class="avatar" id="avatar-letter">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">—</div>
        <div class="user-email" id="user-email">—</div>
      </div>
    </div>
    <div class="tag tag-ok" id="result-tag">✓ Autenticado</div>
    <pre id="result-pre"></pre>
    <button class="btn-danger" onclick="doLogout()">Cerrar sesión</button>
  </div>
</div>

<script>
  const API = 'http://localhost:3001/api/v1';
  let state = { token: null, refreshToken: null, factorId: null, mfaToken: null };

  function show(section) {
    ['login-section','mfa-section','result-section'].forEach(id => {
      document.getElementById(id).style.display = (id === section) ? 'block' : 'none';
    });
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (btn) btn.disabled = loading;
  }

  function showResult(data, tag = 'ok') {
    document.getElementById('result-tag').className = `tag tag-${tag}`;
    document.getElementById('result-tag').textContent = tag === 'ok' ? '✓ Autenticado' : '✗ Error';
    document.getElementById('result-pre').textContent = JSON.stringify(data, null, 2);

    if (data.user) {
      const name = data.user.name || data.user.email?.split('@')[0] || 'Usuario';
      document.getElementById('avatar-letter').textContent = name[0].toUpperCase();
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-email').textContent = data.user.email || '';
      document.getElementById('user-badge').style.display = 'flex';
    }

    show('result-section');
  }

  async function doLogin() {
    setLoading('btn-login', true);
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();

      if (!res.ok) { showResult(data, 'err'); return; }

      if (data.requires_mfa) {
        state.factorId = data.factor_id;
        state.mfaToken = data.mfa_token;
        show('mfa-section');
        document.getElementById('totp-code').focus();
        return;
      }

      state.token = data.access_token;
      state.refreshToken = data.refresh_token;
      showResult(data);
    } catch (e) {
      showResult({ error: e.message }, 'err');
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function doVerifyMfa() {
    const code = document.getElementById('totp-code').value;
    try {
      const res = await fetch(`${API}/auth/mfa/verify`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.mfaToken}`,
        },
        body: JSON.stringify({ factor_id: state.factorId, code }),
      });
      const data = await res.json();
      if (!res.ok) { showResult(data, 'err'); show('result-section'); return; }

      state.token = data.access_token;
      state.refreshToken = data.refresh_token;
      showResult(data);
    } catch (e) {
      showResult({ error: e.message }, 'err');
    }
  }

  async function doGoogle() {
    setLoading('btn-google', true);
    try {
      // redirect_to = this page itself so we can pick up the token from the URL hash
      const redirectTo = window.location.href.split('?')[0];
      const res = await fetch(`${API}/auth/google?redirect_to=${encodeURIComponent(redirectTo)}`);
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        showResult(data, 'err');
      }
    } catch (e) {
      showResult({ error: e.message }, 'err');
    } finally {
      setLoading('btn-google', false);
    }
  }

  async function doLogout() {
    if (!state.token) { resetToLogin(); return; }
    try {
      await fetch(`${API}/auth/logout`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${state.token}` },
      });
    } catch (_) {}
    resetToLogin();
  }

  function resetToLogin() {
    state = { token: null, refreshToken: null, factorId: null, mfaToken: null };
    document.getElementById('totp-code').value = '';
    document.getElementById('user-badge').style.display = 'none';
    show('login-section');
  }

  // Handle OAuth callback: Supabase returns token in URL hash after Google login
  (function handleOAuthCallback() {
    const hash = window.location.hash;
    if (!hash) return;
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (!accessToken) return;

    state.token = accessToken;
    state.refreshToken = refreshToken;
    // Clean URL
    window.history.replaceState(null, '', window.location.pathname);

    // Fetch user info
    fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${accessToken}` } })
      .then(r => r.json())
      .then(user => showResult({ access_token: accessToken, user }))
      .catch(e => showResult({ access_token: accessToken, error: e.message }, 'ok'));
  })();
</script>

</body>
</html>
