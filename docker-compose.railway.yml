# Docker Compose — Railway PostgreSQL variant
# Backend + Frontend + Redis + Nginx en Docker
# PostgreSQL = Railway (no se levanta contenedor local)
#
# Uso:
#   docker compose -f docker-compose.railway.yml up -d
#
# Requiere en apps/backend/.env (o variables de entorno):
#   DATABASE_URL=postgresql://postgres:<pass>@tramway.proxy.rlwy.net:16466/railway
#   JWT_SECRET=...
#   (resto de vars del backend)

services:
  redis:
    image: redis:7-alpine
    container_name: tickets_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: tickets_backend
    restart: unless-stopped
    env_file:
      - path: ./apps/backend/.env
        required: false
    environment:
      NODE_ENV: production
      # DATABASE_URL comes from env_file (Railway connection string)
      REDIS_URL: redis://redis:6379
      # No migration runner against Railway — schema already applied there
      # Set MIGRATIONS_DIR to an empty/nonexistent path to skip migrations
      MIGRATIONS_DIR: /app/migrations-disabled
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
    volumes:
      - uploads_data:/app/uploads
      # No migrations volume — Railway DB schema managed separately
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        BACKEND_INTERNAL_URL: http://backend:3001
    container_name: tickets_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tickets_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  redis_data:
  uploads_data:
